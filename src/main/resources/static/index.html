<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LUMINA SUITES | Панель управления</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0B0C10, #030507);
            color: #EDEDED;
            padding: 32px 24px;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* плавное появление контента */
        body, .section, .card {
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(18px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* глобальный контейнер — центровка + макс ширина */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* навигация — стиль премиум */
        .nav {
            background: rgba(15, 20, 30, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 40px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 0, 0.15) inset;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 215, 0, 0.25);
            transition: all 0.3s ease;
        }

        .nav button {
            background: transparent;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #CCCCDD;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
            font-family: inherit;
        }

        .nav button:hover {
            background: rgba(255, 215, 0, 0.12);
            color: #FFE6A3;
            transform: translateY(-2px);
        }

        .nav button.active {
            background: linear-gradient(135deg, #E5B13B, #C88F1E);
            color: #0A0A0F;
            box-shadow: 0 6px 14px rgba(197, 142, 31, 0.3);
            text-shadow: none;
            font-weight: 700;
        }

        #admin-link {
            background: linear-gradient(135deg, #C53A1F, #9A2A12) !important;
            color: #FFECB3 !important;
            margin-left: auto;
            box-shadow: 0 0 8px rgba(197, 58, 31, 0.5);
            border: 1px solid rgba(255, 200, 100, 0.4);
        }

        #admin-link:hover {
            background: linear-gradient(135deg, #DF4C2E, #B33218) !important;
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(197, 58, 31, 0.4);
        }

        button:active {
            transform: scale(0.97);
        }

        /* секции */
        .section {
            display: none;
            animation: fadeSlideUp 0.45s ease-out;
        }

        .section.active {
            display: block;
        }

        h2 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(120deg, #F5E7C8, #E0BC6E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 28px;
            border-left: 4px solid #E5B13B;
            padding-left: 20px;
        }

        /* сетка карточек номеров */
        #rooms-list {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* премиум карточка */
        .card {
            background: rgba(18, 24, 34, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 0;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(229, 177, 59, 0.2);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(229, 177, 59, 0.6);
            box-shadow: 0 28px 40px -15px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(229, 177, 59, 0.3) inset;
        }

        /* внутренняя структура карточки (flex от JS сохраняется, улучшаем отступы) */
        .card > div {
            padding: 24px 28px;
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        /* изображения */
        .card img {
            border-radius: 24px;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s ease;
            object-fit: cover;
            background: #1E1F2C;
        }

        .card:hover img {
            transform: scale(1.02);
        }

        .card > div > div:first-child {
            flex-shrink: 0;
        }

        /* текстовый блок */
        .card h3 {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            background: linear-gradient(135deg, #FFFFFF, #E5CFA3);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .card p {
            color: #B9C3D9;
            margin: 8px 0;
            font-size: 0.95rem;
        }

        .price {
            font-size: 1.6rem;
            font-weight: 700;
            color: #E5B13B;
            text-shadow: 0 0 6px rgba(229, 177, 59, 0.3);
            margin: 12px 0 16px 0 !important;
            display: inline-block;
        }

        /* универсальные кнопки в карточках */
        .card button, .btn-pay, .card button[onclick*="forceDeleteBooking"], .card button[onclick*="bookRoom"] {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            background: rgba(30, 40, 55, 0.9);
            color: #F5E7D3;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        /* Кнопка ЗАБРОНИРОВАТЬ */
        .card button[onclick*="bookRoom"] {
            background: linear-gradient(95deg, #2C3E4E, #1F2A38);
            border: 1px solid rgba(229, 177, 59, 0.5);
            color: #FFEFCF;
        }
        .card button[onclick*="bookRoom"]:hover {
            background: linear-gradient(95deg, #3E566B, #2A3A48);
            border-color: #E5B13B;
            box-shadow: 0 8px 18px rgba(0,0,0,0.4);
            transform: translateY(-2px);
        }

        /* Оплатить (btn-pay) */
        .btn-pay {
            background: linear-gradient(115deg, #1F6E43, #0F4D2F) !important;
            border: 1px solid #A5D6A5 !important;
            color: #F9F3DF !important;
            box-shadow: 0 4px 12px rgba(31, 110, 67, 0.4);
        }
        .btn-pay:hover {
            background: linear-gradient(115deg, #2B8C56, #146B3A) !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(31, 110, 67, 0.6);
        }

        /* кнопка отмены заявки (forceDeleteBooking) — элегантный глубокий красный */
        .card button[onclick*="forceDeleteBooking"] {
            background: linear-gradient(115deg, #7A2E2A, #561E1B) !important;
            border: 1px solid #E07A5F !important;
            color: #FFE5DC !important;
        }
        .card button[onclick*="forceDeleteBooking"]:hover {
            background: linear-gradient(115deg, #9C3F3A, #6C2622) !important;
            transform: translateY(-2px);
            border-color: #FF9F7C;
        }

        /* статусы (уведомления) */
        .status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
            box-shadow: inset 0 0 0 1px rgba(255,255,240,0.1);
        }

        .status-pending {
            background: rgba(245, 176, 65, 0.2);
            color: #FBC85F;
            border-left: 2px solid #F5B041;
        }
        .status-approved {
            background: rgba(46, 204, 113, 0.2);
            color: #A3E4B7;
            border-left: 2px solid #2ECC71;
        }
        .status-rejected {
            background: rgba(231, 76, 60, 0.2);
            color: #F1948A;
            border-left: 2px solid #E74C3C;
        }
        .status-paid {
            background: rgba(241, 196, 15, 0.25);
            color: #F7DC6F;
            border-left: 2px solid #F1C40F;
        }

        /* уведомления — левая граница остается от JS, но мы улучшаем карточку */
        #bookings-list .card {
            padding: 0;
        }
        #bookings-list .card > div {
            padding: 20px 28px;
        }

        /* дополнительные стили для текста в карточках уведомлений */
        #bookings-list h4 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #F0E2C5;
            margin-bottom: 12px;
        }

        /* пустое состояние */
        #bookings-list, #rooms-list {
            transition: all 0.2s;
        }

        /* премиум скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #10141E;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #E5B13B;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #F5C542;
        }

        /* адаптивность */
        @media (max-width: 780px) {
            body {
                padding: 20px 16px;
            }
            .card > div {
                flex-direction: column;
                padding: 20px;
            }
            .card img, .card > div > div:first-child {
                width: 100% !important;
                text-align: center;
            }
            .card img {
                width: 100% !important;
                max-height: 200px;
                object-fit: cover;
            }
            .nav {
                border-radius: 32px;
                padding: 12px 16px;
                justify-content: center;
            }
            #admin-link {
                margin-left: 0;
            }
            h2 {
                font-size: 1.7rem;
            }
            .price {
                font-size: 1.4rem;
            }
        }

        /* красивое сообщение о загрузке */
        #rooms-list:empty:before, #bookings-list:empty:before {
            content: "✨ Загрузка премиум предложений...";
            display: block;
            padding: 40px;
            text-align: center;
            background: rgba(20, 24, 34, 0.6);
            border-radius: 48px;
            backdrop-filter: blur(12px);
            font-weight: 500;
            color: #CBA458;
        }

        /* иконки и дополнительные акценты */
        .price::before {
            content: "✦ ";
            font-weight: 300;
            color: #F5C542;
        }

        .card button:active {
            transform: scale(0.96);
        }

        /* микро-анимация для появления новых карточек */
        @keyframes cardGlow {
            0% { border-color: rgba(229, 177, 59, 0.1); box-shadow: 0 10px 20px -10px rgba(0,0,0,0.2);}
            100% { border-color: rgba(229, 177, 59, 0.5); box-shadow: 0 25px 35px -12px rgba(0,0,0,0.5);}
        }

        /* стили для placeholder изображения (если нет фото) */
        .card > div > div:first-child > div {
            background: #191E2C;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            color: #B59D6E;
            border: 1px dashed #E5B13B;
            backdrop-filter: blur(4px);
        }

        /* небольшие детали */
        .card .status + p, .card p b {
            color: #E5CFA3;
        }

        .card p[style*="color:red"] {
            color: #FF9F7C !important;
            background: rgba(255, 80, 40, 0.1);
            padding: 8px 14px;
            border-radius: 24px;
            display: inline-block;
        }

        /* кнопка выхода */
        .nav button:last-child {
            background: rgba(200, 70, 50, 0.2);
            border: 1px solid rgba(255, 130, 90, 0.5);
        }
        .nav button:last-child:hover {
            background: rgba(220, 80, 60, 0.4);
            color: #FFC9B7;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <button onclick="showTab('rooms')" id="btn-rooms" class="active">✦ ВЫБРАТЬ НОМЕР</button>
        <button onclick="showTab('bookings')" id="btn-bookings">📜 ЗАЯВКИ & УВЕДОМЛЕНИЯ</button>
        <button id="admin-link" style="display:none;" onclick="goToAdmin()">👑 АДМИН ПАНЕЛЬ</button>
        <button onclick="logout()">🚪 ВЫЙТИ</button>
    </div>

    <div id="rooms" class="section active">
        <h2>✨ ЛЮКСОВЫЕ АПАРТАМЕНТЫ</h2>
        <div id="rooms-list">Загрузка роскошных номеров...</div>
    </div>

    <div id="bookings" class="section">
        <h2>🔔 МОИ БРОНИ И СТАТУСЫ</h2>
        <div id="bookings-list">Нет уведомлений</div>
    </div>
</div>

<script>
    const API = "http://localhost:8080";

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');

        if(id === 'rooms') loadRooms();
        if(id === 'bookings') loadMyBookings();
    }

    function parseJwt(token) {
        try {
            return JSON.parse(atob(token.split('.')[1]));
        } catch (e) {
            return null;
        }
    }

    async function loadRooms() {
        const res = await fetch(`${API}/rooms`);
        const rooms = await res.json();

        document.getElementById('rooms-list').innerHTML = rooms.map(r => `
            <div class="card">
                <div style="display: flex; gap: 15px;">
                    ${r.imageBytes ?
                        `<img src="data:image/png;base64,${r.imageBytes}" style="width:150px; border-radius:8px; object-fit: cover;">` :
                        `<div style="width:150px; height:100px; background:#1A1E2C; border-radius:24px; display:flex; align-items:center; justify-content:center; font-size:0.8rem; color:#CBA458;">📷 Нет фото</div>`
                    }
                    <div style="flex:1">
                        <h3>№${r.number} — ${r.category}</h3>
                        <p>${r.description}</p>
                        <div style="font-size: 0.9em; color: #B2B9D0; margin-bottom: 10px;">
                            <span>📏 ${r.squareMeters} м²</span> |
                            <span>👥 до ${r.capacity} чел.</span>
                        </div>
                        <p class="price">${r.price} ₽ / сутки</p>
                        <button onclick="bookRoom(${r.id})">ЗАБРОНИРОВАТЬ</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function loadMyBookings() {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API}/bookings/my`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const bookings = await res.json();

        document.getElementById('bookings-list').innerHTML = bookings.map(b => {
            const borderColor = b.status === 'CONFIRMED' ? '#2ECC71' : (b.status === 'REJECTED' ? '#E67E22' : '#F5B041');
            let statusClass = '';
            if (b.status === 'CONFIRMED') statusClass = 'status-approved';
            else if (b.status === 'REJECTED') statusClass = 'status-rejected';
            else if (b.status === 'PAID') statusClass = 'status-paid';
            else statusClass = 'status-pending';

            return `
            <div class="card" style="border-left: 5px solid ${borderColor}; transition: 0.2s;">
                <div style="padding: 20px 28px;">
                    <h4>🏨 Номер №${b.roomNumber}</h4>
                    <p>Статус: <span class="status ${statusClass}">${b.status}</span></p>
                    <div style="margin-top: 18px; display: flex; gap: 16px; flex-wrap: wrap;">
                        ${b.status === 'CONFIRMED' ? `<button class="btn-pay" onclick="payBooking(${b.id})">💎 ОПЛАТИТЬ</button>` : ''}
                        <button onclick="forceDeleteBooking(${b.id})" style="background:#6c757d; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">🗑️ ОТМЕНИТЬ ЗАЯВКУ</button>
                    </div>
                    ${b.status === 'REJECTED' ? `<p style="color:#FFB085; margin-top:16px; background: rgba(231,76,60,0.15); padding: 8px 16px; border-radius: 40px;"><b>❌ Причина отказа:</b> ${b.rejectionReason || 'Не указана'}</p>` : ''}
                    ${b.status === 'PAID' ? `<p style="color:#B9F6CA; margin-top:16px; background: rgba(46,204,113,0.12); padding: 8px 16px; border-radius: 40px;"><b>✅ Номер оплачен и забронирован за вами!</b></p>` : ''}
                </div>
            </div>
        `}).join('');
        if(bookings.length === 0) document.getElementById('bookings-list').innerHTML = '<div class="card" style="text-align:center; padding: 32px;">✨ У вас пока нет заявок. Оставьте заявку на любой номер ✨</div>';
    }

    async function bookRoom(roomId) {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API}/bookings/create`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ roomId })
        });
        if(res.ok) alert("✨ Заявка отправлена администратору! Ожидайте подтверждения.");
        else alert("Ошибка при бронировании.");
    }

    function logout() {
        localStorage.removeItem('token');
        document.cookie = "auth_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;";
        window.location.href = 'login.html';
    }

    window.onload = async () => {
        const token = localStorage.getItem('token');
        if(!token) {
            window.location.href = 'login.html';
            return;
        }

        const userData = parseJwt(token);
        if (userData && (userData.role === 'ADMIN' || userData.role === 'Role.ADMIN')) {
            const adminBtn = document.getElementById('admin-link');
            if (adminBtn) adminBtn.style.display = 'inline-block';
        }

        loadRooms();
    };

    function goToAdmin() {
        const token = localStorage.getItem('token');
        if (token) {
            document.cookie = `token=${token}; path=/; max-age=3600; SameSite=Lax`;
            setTimeout(() => {
                window.location.href = '/admin/panel';
            }, 50);
        } else {
            alert("Сначала авторизуйтесь");
        }
    }

    async function payBooking(bookingId) {
        const token = localStorage.getItem('token');
        if (!confirm("💳 Подтвердить оплату? Номер станет полностью вашим.")) return;

        const res = await fetch(`${API}/bookings/pay/${bookingId}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.ok) {
            alert("✅ Оплата прошла успешно! Номер закреплён за вами. Наслаждайтесь отдыхом.");
            loadMyBookings();
            loadRooms();
        } else {
            alert("❌ Ошибка при оплате. Попробуйте позже.");
        }
    }

    async function forceDeleteBooking(bookingId) {
        if (!confirm("⚠️ Отменить бронирование? Если оно уже оплачено — средства не возвращаются.")) return;

        const token = localStorage.getItem('token');
        const res = await fetch(`${API}/bookings/delete/${bookingId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.ok) {
            alert("Бронирование отменено.");
            loadMyBookings();
            loadRooms();
        } else {
            alert("Не удалось отменить заявку.");
        }
    }

    async function cancelBooking(bookingId) {
        // запасная функция (не используется напрямую, но оставлена для совместимости)
        const token = localStorage.getItem('token');
        if (!confirm("Отменить заявку?")) return;
        const res = await fetch(`${API}/bookings/cancel/${bookingId}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
            alert("Заявка отменена.");
            loadMyBookings();
            loadRooms();
        }
    }
</script>
</body>
</html>
