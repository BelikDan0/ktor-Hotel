<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel App — Бронирование номеров</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--card);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        nav button {
            background: transparent;
            border: 1px solid #334155;
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        nav button.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Грид для комнат */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .room-card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            border: 1px solid #334155;
        }

        .room-card:hover {
            transform: translateY(-5px);
        }

        .room-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #2d3748;
        }

        .room-info {
            padding: 20px;
        }

        .room-price {
            font-size: 1.5rem;
            color: var(--accent);
            font-weight: bold;
            margin: 10px 0;
        }

        .btn-book {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-book:hover {
            filter: brightness(1.2);
        }

        /* Таблица бронирований */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th { color: var(--text-muted); }

        .status-pending { color: #fbbf24; }
        .status-approved { color: #22c55e; }
    </style>
</head>
<body>

<header>
    <h1>GRAND HOTEL</h1>
    <nav>
        <button onclick="switchTab('rooms')" id="btn-rooms" class="active">Номера</button>
        <button onclick="switchTab('my-bookings')" id="btn-bookings">Мои брони</button>
        <button onclick="switchTab('profile')" id="btn-profile">Профиль</button>
    </nav>
</header>

<div class="container">

    <div id="rooms" class="tab-content active">
        <div id="rooms-container" class="rooms-grid">
            <p style="text-align: center; width: 100%;">Загрузка номеров...</p>
        </div>
    </div>

    <div id="my-bookings" class="tab-content">
        <h2>Ваши бронирования</h2>
        <div id="bookings-container">
        </div>
    </div>

    <div id="profile" class="tab-content">
        <div style="background: var(--card); padding: 40px; border-radius: 20px; text-align: center;">
            <div id="profile-content">
            </div>
        </div>
    </div>

</div>

<script>
    const API_URL = 'http://localhost:8080/api';

    // 1. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId.replace('my-', '')).classList.add('active');

        if (tabId === 'my-bookings') loadMyBookings();
        if (tabId === 'profile') updateProfileUI();
    }

    // 2. ЗАГРУЗКА НОМЕРОВ
    async function loadRooms() {
        try {
            const res = await fetch(`${API_URL}/rooms`);
            const rooms = await res.json();
            const container = document.getElementById('rooms-container');

            container.innerHTML = rooms.map(room => `
                <div class="room-card">
                    <img src="${room.imageUrl}" class="room-img" alt="Room">
                    <div class="room-info">
                        <h3>Номер №${room.number}</h3>
                        <p style="color: var(--text-muted)">${room.category}</p>
                        <div class="room-price">${room.price} ₽ / ночь</div>
                        <button class="btn-book" onclick="bookRoom(${room.id})">Забронировать</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('rooms-container').innerHTML = '<p>Ошибка загрузки номеров</p>';
        }
    }

    // 3. БРОНИРОВАНИЕ
   async function bookRoom(id) {
    const token = localStorage.getItem('token');
    if (!token) {
        alert("Сначала войдите!");
        return;
    }

    try {
        const response = await fetch('/api/bookings/create', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            // Отправляем объект с полем roomId
            body: JSON.stringify({ roomId: id })
        });

        if (response.ok) {
            alert("Успешно забронировано!");
            switchTab('my-bookings'); // Переключаем на список
        } else {
            alert("Ошибка при бронировании");
        }
    } catch (e) {
        console.error(e);
    }
}

    // 4. СПИСОК БРОНЕЙ ПОЛЬЗОВАТЕЛЯ
    async function loadMyBookings() {
        const token = localStorage.getItem('token');
        const container = document.getElementById('bookings-container');

        if (!token) {
            container.innerHTML = `
                <div style="text-align:center; padding: 40px;">
                    <p>Войдите, чтобы увидеть свои бронирования</p>
                    <button onclick="window.location.href='login.html'" class="btn-book" style="width:200px; margin-top:10px;">Войти</button>
                </div>
            `;
            return;
        }

        try {
            const res = await fetch(`${API_URL}/bookings/my`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const bookings = await res.json();

            if (bookings.length === 0) {
                container.innerHTML = '<p style="text-align:center;">У вас пока нет бронирований</p>';
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr><th>Номер</th><th>Цена</th><th>Статус</th></tr>
                    </thead>
                    <tbody>
                        ${bookings.map(b => `
                            <tr>
                                <td>№${b.roomNumber}</td>
                                <td>${b.price} ₽</td>
                                <td class="${b.status === 'PENDING' ? 'status-pending' : 'status-approved'}">
                                    ${b.status === 'PENDING' ? 'Ожидает' : 'Подтверждено'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } catch (e) {
            container.innerHTML = '<p>Ошибка загрузки списка</p>';
        }
    }

    // 5. ПРОФИЛЬ
    function updateProfileUI() {
        const token = localStorage.getItem('token');
        const content = document.getElementById('profile-content');

        if (token) {
            content.innerHTML = `
                <div style="font-size: 50px; margin-bottom: 10px;">👤</div>
                <h2>Личный кабинет</h2>
                <p style="color: var(--text-muted); margin-bottom: 30px;">Вы авторизованы в системе</p>
                <button onclick="logout()" style="background: #ef4444; color:white; border:none; padding:10px 30px; border-radius:8px; cursor:pointer;">Выйти из аккаунта</button>
            `;
        } else {
            content.innerHTML = `
                <h2>Вы не вошли</h2>
                <p style="color: var(--text-muted); margin-bottom: 20px;">Авторизуйтесь, чтобы бронировать лучшие номера</p>
                <button onclick="window.location.href='login.html'" class="btn-book" style="width:200px;">Войти</button>
            `;
        }
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.reload();
    }

    // Старт
    window.onload = () => {
        loadRooms();
        updateProfileUI();
    };
</script>

</body>
</html>
